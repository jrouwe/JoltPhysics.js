<!DOCTYPE html>
<html lang="en">
	<head>
		<title>JoltPhysics.js demo</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link rel="stylesheet" type="text/css" href="style.css">
	</head>
	<body>
		<div id="container">Loading...</div>
		<div id="info">JoltPhysics.js alternative collision filtering ray cast demo</div>

		<script src="js/three/three.min.js"></script>
		<script src="js/three/OrbitControls.js"></script>
		<script src="js/three/WebGL.js"></script>
		<script src="js/three/stats.min.js"></script>
		<script src="js/example.js"></script>

		<script type="module">
			// In case you haven't built the library yourself, replace URL with: https://www.unpkg.com/jolt-physics/dist/jolt-physics.wasm-compat.js
			import initJolt from './js/jolt-physics.wasm-compat.js';

			initJolt().then(function (Jolt) {
				// Define the group bits
				const GROUP_STATIC = 1;
				const GROUP_FLOOR1 = 2;
				const GROUP_FLOOR2 = 4;
				const GROUP_FLOOR3 = 8;
				const GROUP_ALL = GROUP_STATIC | GROUP_FLOOR1 | GROUP_FLOOR2 | GROUP_FLOOR3;

				// Configure alternative collision filtering
				setupCollisionFiltering = function (settings) {
					// Filter class to test if two objects can collide based on their object layer. Used while finding collision pairs.
					// Uses group bits and mask bits. Two layers can collide if Object1.Group & Object2.Mask is non-zero and Object2.Group & Object1.Mask is non-zero.
					// The behavior is similar to that in e.g. Bullet.
					let objectFilter = new Jolt.ObjectLayerPairFilterMask();

					// Layer that objects can be in, determines which other objects it can collide with
					// In this example we're going to use a contrived setup where static + floor1 goes into one broadphase layer and floor2 and floor3 in another
					// to demo how you combine multiple layers in the same broadphase layer.
					const NUM_BROAD_PHASE_LAYERS = 2;
					const BP_LAYER0 = new Jolt.BroadPhaseLayer(0);
					const BP_LAYER1 = new Jolt.BroadPhaseLayer(1);
					let bpInterface = new Jolt.BroadPhaseLayerInterfaceMask(NUM_BROAD_PHASE_LAYERS);
					bpInterface.ConfigureLayer(BP_LAYER0, GROUP_FLOOR1 | GROUP_STATIC, 0);
					bpInterface.ConfigureLayer(BP_LAYER1, GROUP_FLOOR2 | GROUP_FLOOR3, 0);

					settings.mObjectLayerPairFilter = objectFilter;
					settings.mBroadPhaseLayerInterface = bpInterface;
					settings.mObjectVsBroadPhaseLayerFilter = new Jolt.ObjectVsBroadPhaseLayerFilterMask(bpInterface);
				};

				// Initialize this example
				initExample(Jolt);

				// Typing shortcut
				const sGetObjectLayer = function (group, mask) { return Jolt.ObjectLayerPairFilterMask.prototype.sGetObjectLayer(group, mask); }

				// Create a floor that is in group static and collides with static
				createBox(Jolt.RVec3.prototype.sZero(), Jolt.Quat.prototype.sIdentity(), new Jolt.Vec3(50, 0.5, 50), Jolt.EMotionType_Static, sGetObjectLayer(GROUP_STATIC, GROUP_STATIC));

				// 1st floor: Part of group static but colliding only with GROUP_FLOOR1
				createBox(new Jolt.RVec3(0, 3, 0), Jolt.Quat.prototype.sIdentity(), new Jolt.Vec3(5, 0.5, 5), Jolt.EMotionType_Static, sGetObjectLayer(GROUP_STATIC, GROUP_FLOOR1), 0x9f0000);

				// 2nd floor: Part of group static but colliding only with GROUP_FLOOR2
				createBox(new Jolt.RVec3(0, 6, 0), Jolt.Quat.prototype.sIdentity(), new Jolt.Vec3(5, 0.5, 5), Jolt.EMotionType_Static, sGetObjectLayer(GROUP_STATIC, GROUP_FLOOR2), 0x009f00);

				// 3rd floor: Part of group static but colliding only with GROUP_FLOOR3
				createBox(new Jolt.RVec3(0, 9, 0), Jolt.Quat.prototype.sIdentity(), new Jolt.Vec3(5, 0.5, 5), Jolt.EMotionType_Static, sGetObjectLayer(GROUP_STATIC, GROUP_FLOOR3), 0x00009f);
				
				// Create ray
				let ray = new Jolt.RRayCast;
				ray.mDirection.Set(0, -10, 0);
				let drawRay = (ray) => {
					addLine(ray.mOrigin, ray.mOrigin.Clone().Add(ray.mDirection), 0xff0000);
				};

				// Create ray cast settings (e.g. if we want back face culling)
				let raySettings = new Jolt.RayCastSettings;

				const get_filter = function(group) { 
					let object_layer = sGetObjectLayer(group, GROUP_ALL);
					return [ new Jolt.DefaultBroadPhaseLayerFilter(jolt.GetObjectVsBroadPhaseLayerFilter(), object_layer), new Jolt.DefaultObjectLayerFilter(jolt.GetObjectLayerPairFilter(), object_layer) ];
				}

				let bodyFilter = new Jolt.BodyFilter(); // We don't want to filter out any bodies
				let shapeFilter = new Jolt.ShapeFilter(); // We don't want to filter out any shapes

				// Create collector
				let collector = new Jolt.CastRayCollectorJS;
				let drawHit = (body, hit) => {
					let hitPoint = ray.GetPointOnRay(hit.mFraction);
					addMarker(hitPoint, 1, 0x00ffff);
					let hitNormal = body.GetWorldSpaceSurfaceNormal(hit.mSubShapeID2, hitPoint);
					addLine(hitPoint, hitPoint.Clone().Add(hitNormal.Mul(2)), 0x00ff00);
				}
				collector.OnBody = (body) => {
					body = Jolt.wrapPointer(body, Jolt.Body);
					collector.body = body; // Store the body for the AddHit callback, note this is called whenever there is a collision with the bounding box of the object so you may not receive an AddHit callback for this body
				};
				collector.AddHit = (rayCastResult) => {
					rayCastResult = Jolt.wrapPointer(rayCastResult, Jolt.RayCastResult);
					drawHit(collector.body, rayCastResult);
				};
				collector.Reset = () => {
					// Reset your bookkeeping, in any case we'll need to reset the early out fraction for the base class
					collector.ResetEarlyOutFraction();
				};

				// Cast the ray against floor 1 only
				let [ bpFilter, objectFilter ] = get_filter(GROUP_FLOOR1);
				ray.mOrigin.Set(-4, 10, 0);
				drawRay(ray);
				physicsSystem.GetNarrowPhaseQuery().CastRay(ray, raySettings, collector, bpFilter, objectFilter, bodyFilter, shapeFilter);
				collector.Reset();

				// Cast the ray against floor 2 only
				[ bpFilter, objectFilter ] = get_filter(GROUP_FLOOR2);
				ray.mOrigin.Set(-2, 10, 0);
				drawRay(ray);
				physicsSystem.GetNarrowPhaseQuery().CastRay(ray, raySettings, collector, bpFilter, objectFilter, bodyFilter, shapeFilter);
				collector.Reset();

				// Cast the ray against floor 3 only
				[ bpFilter, objectFilter ] = get_filter(GROUP_FLOOR3);
				ray.mOrigin.Set(0, 10, 0);
				drawRay(ray);
				physicsSystem.GetNarrowPhaseQuery().CastRay(ray, raySettings, collector, bpFilter, objectFilter, bodyFilter, shapeFilter);
				collector.Reset();

				// Cast the ray against static only
				[ bpFilter, objectFilter ] = get_filter(GROUP_STATIC);
				ray.mOrigin.Set(2, 10, 0);
				drawRay(ray);
				physicsSystem.GetNarrowPhaseQuery().CastRay(ray, raySettings, collector, bpFilter, objectFilter, bodyFilter, shapeFilter);
				collector.Reset();

				// Cast the ray against everything
				[ bpFilter, objectFilter ] = get_filter(GROUP_ALL);
				ray.mOrigin.Set(4, 10, 0);
				drawRay(ray);
				physicsSystem.GetNarrowPhaseQuery().CastRay(ray, raySettings, collector, bpFilter, objectFilter, bodyFilter, shapeFilter);
				collector.Reset();
			});

		</script>
	</body>
</html>
